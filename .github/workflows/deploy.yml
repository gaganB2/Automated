# .github/workflows/deploy.yml

name: Validate and Deploy HTML to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: (CI) Validate the HTML file using a more robust validator
      # This action is well-maintained and provides great feedback.
      - name: Validate HTML
        uses: html-validate/action@v1
        with:
          # Tell the validator which file(s) to check
          files: 'index.html'
      
      # Step 3: (CD) Prepare the file for GitHub Pages deployment
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The path should be the root directory since index.html is there
          path: '.'

      # Step 4: (CD) Deploy the artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4